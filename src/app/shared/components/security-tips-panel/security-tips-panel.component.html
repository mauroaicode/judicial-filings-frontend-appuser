<div class="security-panel-container">
  <!-- Background Image & Overlay -->
  <div class="background-wrapper">
    <img [src]="imageSrc()" alt="Background" />
    <div class="brand-overlay"></div>
  </div>

  <!-- Content -->
  <div class="content-wrapper">
    <div class="glass-card animate-in fade-in zoom-in duration-700">
      <!-- Title -->
      <h2 class="animate-in slide-in-from-left duration-500">
        {{ titleKey() | transloco }}
      </h2>

      <!-- Tips List -->
      <div class="tips-list">
        <div class="tip-item animate-in slide-in-from-left delay-300 duration-500">
          <div class="tip-icon">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
          </div>
          <p>{{ tip1Key() | transloco }}</p>
        </div>

        <div class="tip-item animate-in slide-in-from-left delay-400 duration-500">
          <div class="tip-icon">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <p>{{ tip2Key() | transloco }}</p>
        </div>

        <div class="tip-item animate-in slide-in-from-left delay-500 duration-500">
          <div class="tip-icon">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
          </div>
          <p>{{ tip3Key() | transloco }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
