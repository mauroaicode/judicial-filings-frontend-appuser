<div class="flex min-h-screen bg-base">
  <div class="flex w-full flex-col items-center justify-center p-8 md:w-1/2">
    <div class="w-full max-w-md">
      <app-title-system-auth/>

      <p class="mt-2 text-sm mb-5 text-base-content/50 text-center">
        {{ 'auth.signIn.welcome' | transloco }}
      </p>
      <!-- Sign In Card -->
      <div class="card bg-base-300/30 rounded-lg">
        <div class="card-body">
          <h2 class="card-title text-2xl font-bold mb-4 text-neutral text-center">{{ 'auth.signIn.title' | transloco }}</h2>

          <!-- Alert -->
          @if (showAlert()) {
            <app-alert
              [type]="alertType()"
              [message]="alertMessage()"
              [useTranslation]="!isDirectMessage()"
              class="mb-4"
            />
          }

          <!-- Sign In Form -->
          <form [formGroup]="signInForm" (ngSubmit)="signIn()">
            <!-- Email Field -->
            <div class="form-control mb-4">
              <label class="label">
                <span class="label-text text-neutral mb-1">{{ 'auth.signIn.emailLabel' | transloco }}</span>
              </label>
              <input
                type="email"
                formControlName="email"
                [placeholder]="'auth.signIn.emailPlaceholder' | transloco"
                class="input w-full pr-12 input-md"
                [class.input-error]="isFieldInvalid('email')"
              />
              @if (isFieldInvalid('email')) {
                <label class="label mt-1">
                  <span class="label-text-alt text-error">
                    {{ getFieldError('email') | transloco }}
                  </span>
                </label>
              }
            </div>

            <!-- Password Field -->
            <div class="form-control mb-4">
              <label class="label">
                <span class="label-text text-neutral mb-1">{{ 'auth.signIn.passwordLabel' | transloco }}</span>
              </label>
              <div class="relative">
                <input
                  [type]="showPassword() ? 'text' : 'password'"
                  formControlName="password"
                  [placeholder]="'auth.signIn.passwordPlaceholder' | transloco"
                  class="input w-full pr-12 input-md"
                  [class.input-error]="isFieldInvalid('password')"
                />
                <button
                  type="button"
                  class="btn btn-ghost btn-sm btn-circle absolute right-2 top-1/2 -translate-y-1/2"
                  (click)="togglePasswordVisibility()"
                >
                  @if (showPassword()) {
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke-width="1.5"
                      stroke="currentColor"
                      class="h-5 w-5"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 01-4.243-4.243M4.34 4.34l4.243 4.243"
                      />
                    </svg>
                  } @else {
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke-width="1.5"
                      stroke="currentColor"
                      class="h-5 w-5"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
                      />
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                      />
                    </svg>
                  }
                </button>
              </div>
              @if (isFieldInvalid('password')) {
                <label class="label mt-1">
                  <span class="label-text-alt text-error">
                    {{ getFieldError('password') | transloco }}
                  </span>
                </label>
              }
            </div>

            <!-- Sign In Button -->
            <button
              type="submit"
              class="btn btn-neutral w-full mb-4"
              [disabled]="signInForm.invalid || isLoading()"
            >
              @if (isLoading()) {
                <span class="loading loading-spinner"></span>
                {{ 'auth.signIn.loading' | transloco }}
              } @else {
                {{ 'auth.signIn.signInButton' | transloco }}
              }
            </button>

            <!-- Forgot Password Link -->
            <div class="text-center">
              <a routerLink="/forgot-password" class="link link-neutral text-sm">
                {{ 'auth.signIn.forgotPassword' | transloco }}
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <div class="hidden w-1/2 md:flex relative min-h-screen">
    <app-security-tips-panel
      imageSrc="/images/ui/bg-sign-in.png"
      [titleKey]="'auth.signIn.securityTitle'"
      [tip1Key]="'auth.signIn.securityTip1'"
      [tip2Key]="'auth.signIn.securityTip2'"
      [tip3Key]="'auth.signIn.securityTip3'"
    />
  </div>
</div>
