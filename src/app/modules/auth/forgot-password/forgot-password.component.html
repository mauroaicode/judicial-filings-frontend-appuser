<div class="flex min-h-screen bg-slate-50">
  <!-- Left Side: Forgot Password Form -->
  <div class="flex w-full flex-col items-center justify-center p-8 md:w-1/2">
    <div class="w-full max-w-md animate-in fade-in slide-in-from-bottom duration-500">
      <!-- Logo & Welcome -->
      <app-title-system-auth />

      <p class="mt-1 text-sm mb-8 text-slate-400 text-center font-medium">
        {{ 'auth.forgotPassword.subtitle' | transloco }}
      </p>

      <!-- Card -->
      <div class="card bg-white shadow-2xl shadow-slate-200/50 border border-slate-100 rounded-3xl overflow-hidden">
        <div class="card-body p-8 sm:p-10">
          <h2 class="text-2xl font-black text-slate-800 mb-8 text-center tracking-tight">
            {{ 'auth.forgotPassword.title' | transloco }}
          </h2>

          <!-- Alert -->
          @if (showAlert()) {
          <div class="mb-6">
            <app-alert [type]="alertType()" [message]="alertMessage()" [useTranslation]="!isDirectMessage()" />
          </div>
          }

          <!-- Form -->
          <form [formGroup]="forgotPasswordForm" (ngSubmit)="submitForgotPassword()" class="space-y-6">
            <!-- Identification -->
            <div class="form-control">
              <label class="label !pb-1.5">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-400">{{
                  'auth.forgotPassword.identificationLabel' | transloco }}</span>
              </label>
              <div class="relative group">
                <div
                  class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-300 group-focus-within:text-primary transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                  </svg>
                </div>
                <input type="text" formControlName="identification"
                  class="input w-full pl-12 bg-slate-50 border-slate-200 focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl transition-all font-semibold"
                  [class.input-error]="isFieldInvalid('identification')" [disabled]="wasCodeSent()" />
              </div>
              @if (isFieldInvalid('identification')) {
              <label class="label mt-1 animate-in fade-in slide-in-from-top-1">
                <span class="label-text-alt text-error font-bold flex items-center gap-1">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                      d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                      clip-rule="evenodd" />
                  </svg>
                  {{ getFieldError('identification') | transloco }}
                </span>
              </label>
              }
            </div>

            @if (!wasCodeSent()) {
              <button type="submit"
                class="btn btn-primary w-full h-14 rounded-xl shadow-lg shadow-primary/25 text-base font-bold normal-case hover:scale-[1.02] active:scale-[0.98] transition-all"
                [disabled]="forgotPasswordForm.invalid || isLoading()">
                @if (isLoading()) {
                <span class="loading loading-spinner"></span>
                {{ 'auth.forgotPassword.sendingCode' | transloco }}
                } @else {
                {{ 'auth.forgotPassword.sendCodeButton' | transloco }}
                }
              </button>
            }

            <div class="text-center mt-6">
                <a routerLink="/sign-in"
                  class="text-sm font-bold text-slate-400 hover:text-primary transition-colors inline-flex items-center gap-2 group">
                  <svg xmlns="http://www.w3.org/2000/svg"
                    class="h-4 w-4 transform group-hover:-translate-x-1 transition-transform" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                  </svg>
                  {{ 'auth.forgotPassword.backToSignIn' | transloco }}
                </a>
              </div>
          </form>
        </div>
      </div>

      <!-- Footer Info -->
      <p class="mt-8 text-center text-slate-400 text-xs font-bold uppercase tracking-[0.2em] opacity-50">
        &copy; {{ currentYear }} NotiJudicial
      </p>
    </div>
  </div>

  <!-- Right Side: Security Tips & Visuals -->
  <div class="hidden md:flex w-1/2 relative bg-[#1e1b4b]">
    <div class="sticky top-0 h-screen w-full overflow-hidden">
      <app-security-tips-panel imageSrc="/images/ui/bg-sign-in.png" [titleKey]="'auth.forgotPassword.securityTitle'"
        [tip1Key]="'auth.forgotPassword.securityTip1'" [tip2Key]="'auth.forgotPassword.securityTip2'"
        [tip3Key]="'auth.forgotPassword.securityTip3'" />
    </div>
  </div>
</div>
