<div class="flex h-screen w-full bg-base-200 overflow-hidden">
  <!-- Sidebar -->
  <app-sidebar #sidebar></app-sidebar>

  <!-- Main Content Area -->
  <div class="flex flex-1 flex-col h-screen min-w-0 transition-all duration-300">

    <!-- Header (Fixed at top) -->
    <div class="relative w-full flex-none z-[100]">
      <app-header [pageTitle]="pageTitle()" [sidebar]="sidebar" [isScrolled]="pageScrolled()"
        (toggleSidebar)="onToggleSidebar()"></app-header>
    </div>

    <!-- Page Content (Scrollable independently) -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden p-4 md:p-6 pb-20 relative" (scroll)="onMainScroll($event)">
      
      <!-- Security Warning: Must Change Password -->
      @if (mustChangePassword()) {
        <div class="mb-6 animate-in fade-in slide-in-from-top-4 duration-500">
          <app-alert 
            type="error" 
            [message]="'auth.success.mustChangePassword'" 
            [useTranslation]="true" />
        </div>
      }

      <router-outlet></router-outlet>
    </main>

    <!-- Footer (Fixed at bottom) -->
    <footer
      class="w-full flex-none flex flex-col sm:flex-row items-center justify-center sm:justify-between gap-1 sm:gap-3 px-6 py-3 sm:py-4 border-t border-brand-neutral/5 bg-white shadow-[0_-2px_10px_rgba(0,0,0,0.02)] relative z-20">
      <div class="flex items-center">
        <img src="images/ui/logo-notijudicial.png" alt="NotiJudicial"
          class="h-5 sm:h-6 object-contain grayscale opacity-60 hover:grayscale-0 hover:opacity-100 transition-all duration-300" />
      </div>
      <div
        class="text-[9px] sm:text-xs font-medium tracking-wide text-brand-neutral/40 uppercase text-center leading-tight">
        &copy; 2026<br class="sm:hidden" /> Todos los derechos reservados
      </div>
    </footer>
  </div>

  <!-- WebSocket Notifications Listener -->
  <app-notifications></app-notifications>
</div>
