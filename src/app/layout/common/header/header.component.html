<header class="sticky top-0 z-30 flex h-16 items-center justify-between bg-base-100 shadow-md">
  <div class="flex flex-1 items-center gap-4 px-4 md:px-6">
    <!-- Menu Toggle Button (Mobile) -->
    <button
      type="button"
      class="btn btn-ghost btn-sm md:hidden"
      (click)="onToggleSidebar()"
      [attr.aria-label]="'navigation.toggleSidebar' | transloco"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        />
      </svg>
    </button>

    <!-- Page Title -->
    @if (translatedTitle()) {
      <h1 class="text-lg font-semibold text-base-content md:text-xl">
        {{ translatedTitle() }}
      </h1>
    }
  </div>

  <!-- Right Side Actions -->
  <div class="flex items-center gap-2 px-4 md:px-6">

    <!-- Messages -->
    <button
      type="button"
      class="btn btn-ghost btn-sm relative"
      [attr.aria-label]="'header.messages' | transloco"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
        />
      </svg>
      <!-- Badge for notifications count (if needed) -->
      <!-- <span class="badge badge-error badge-xs absolute -right-1 -top-1">3</span> -->
    </button>

    <!-- Notifications -->
    <button
      type="button"
      class="btn btn-ghost btn-sm relative"
      [attr.aria-label]="'header.notifications' | transloco"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
        />
      </svg>
      <!-- Badge for notifications count (if needed) -->
      <!-- <span class="badge badge-error badge-xs absolute -right-1 -top-1">5</span> -->
    </button>

    <!-- User Menu -->
    <div class="dropdown dropdown-end">
      <label
        tabindex="0"
        class="btn btn-ghost btn-circle avatar"
        [attr.aria-label]="'header.userMenu' | transloco"
      >
        <div class="w-10 rounded-full bg-accent text-accent-content flex items-center justify-center">
          @if (currentUser(); as user) {
            <span class="text-sm font-semibold">
              {{ (user.name && user.name.length > 0) ? user.name.charAt(0).toUpperCase() : 'U' }}
            </span>
          } @else {
            <span class="text-sm font-semibold">U</span>
          }
        </div>
      </label>
      <ul
        tabindex="0"
        class="dropdown-content menu rounded-box z-[1] mt-3 w-52 bg-base-100 p-2 shadow-lg"
      >
        <li class="menu-title">
          @if (currentUser(); as user) {
            <span>{{ user.name }} {{ user.last_name }}</span>
            <span class="text-xs text-base-content/70">{{ user.email }}</span>
          }
        </li>
        <li>
          <a>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
              />
            </svg>
            {{ 'header.profile' | transloco }}
          </a>
        </li>
        <li>
          <a>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              />
            </svg>
            {{ 'header.settings' | transloco }}
          </a>
        </li>
        <li>
          <a (click)="signOut()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              />
            </svg>
            {{ 'header.signOut' | transloco }}
          </a>
        </li>
      </ul>
    </div>
  </div>
</header>
